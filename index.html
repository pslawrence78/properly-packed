<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Family travel packing, without the forgotten bits."
    />
    <meta name="theme-color" content="#2f3a3d" />
    <meta name="application-name" content="Properly Packed" />
    <meta name="apple-mobile-web-app-title" content="Packed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" href="%BASE_URL%icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/icon.svg" />
    <title>Properly Packed</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get("redirect");

        if (redirect) {
          var basePath = "%BASE_URL%".replace(/\/$/, "");
          window.history.replaceState(null, "", basePath + redirect);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
